id: org.kde.discover
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: plasma-discover
rename-icon: plasmadiscover
finish-args:
  # 3D acceleration
  - --device=dri
  # access to system flatpaks, nothing works without it
  - --filesystem=/var/lib/flatpak
  # access to user flatpaks
  - --filesystem=xdg-data/flatpak
  # Install or upgrade of flatpaks doesn't work without it
  - --filesystem=/var/tmp
  # Needed for cleaning up remaining user data of flatpaks
  - --filesystem=~/.var/app
  # X11
  - --share=ipc
  # download applications from the internet
  - --share=network
  # show a window
  - --socket=fallback-x11
  - --socket=wayland
  # Removing and installing doesn't work without it
  - --system-talk-name=org.freedesktop.Flatpak.SystemHelper
  # fwupd integration
  - --system-talk-name=org.freedesktop.fwupd
  # needed for installing flatpaks
  - --talk-name=org.freedesktop.Flatpak

  # for the button that launches the plasma logout prompt
  - --talk-name=org.kde.LogoutPrompt
  - --talk-name=org.kde.Shutdown

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
  - '*.pc'
  - '*.a'
  - '*.la'

modules:
  - name: discover
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DWITH_KCM=OFF
      - -DWITH_NOTIFIER=OFF
    cleanup:
      - /etc/kr5.conf
      - /etc/xdg/autostart
      - /lib/krb5
      - /lib/plasma-discover/libDiscoverNotifiers.so
      - /lib/plugins/discover-notifier/FlatpakNotifier.so
      # TODO: make kns work, remove this
      - /lib/plugins/discover/kns-backend.so
      - /share/applications/org.kde.discover.snap.desktop
      - /share/knotifications6/discoverabstractnotifier.notifyrc
      - /share/locale/*/LC_MESSAGES/kcm_updates.mo
      - /share/locale/*/LC_MESSAGES/plasma-discover-notifier.mo
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/plasma/6.6.4/discover-6.6.4.tar.xz
        sha256: dd673afead30054f7492a882a2e58aad6cb0c52056f8b503a027bce5e04ef4da
        x-checker-data:
          type: anitya
          project-id: 8761
          stable-only: true
          url-template: https://download.kde.org/stable/plasma/$version/discover-$version.tar.xz
          is-main-source: true

      # Warn about missing functionality
      - type: patch
        path: metainfo-warning.patch

      - type: patch
        path: fix-appstream-id-mismatch.patch

    modules:
      - name: appstream
        config-opts:
          - -Dqt=true
          - -Dstemming=false
          - -Dcompose=false
          - -Ddocs=false
          - -Dman=false
          - -Dapidocs=false
          - -Dinstall-docs=false
          - -Dbash-completion=false
        cleanup:
          - /share/metainfo
          - /bin/appstreamcli
          - /share/gir-1.0
          - /share/bash-completion
          - /share/installed-tests
          - /lib/girepository-1.0
          - /share/appstream/appstream.conf
          - /lib/cmake/AppStreamQt/*.cmake
        buildsystem: meson
        sources:
          - type: git
            url: https://github.com/ximion/appstream.git
            commit: 699a38f9ba93782a0fa19c86f81db0d6424d3afa
            tag: v1.1.2
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
              is-important: true

        # supports cmake now but I can't convinvce appstream to find it then
        modules:
          - name: libfyaml
            buildsystem: autotools
            make-install-args:
              - PREFIX=/app
            cleanup:
              - /bin/*
            sources:
              - type: git
                url: https://github.com/pantoniou/libfyaml
                commit: 8054c66e0454a09a810f756996d1b280738594e5
                tag: v0.9
            x-checker-data:
              type: git
              tag-pattern: v^([\d.]+)$

      - name: fwupd
        buildsystem: meson
        config-opts:
          - -Dbuild=library
          - -Dfish_completion=false
          - -Dbash_completion=false
          - -Dman=false
          - -Dsystemd=disabled
          - -Dpassim=disabled
          - -Ddocs=disabled
          - -Dtests=false
          - -Dvendor_ids_dir=/app/share/hwdata
          - -Dvalgrind=disabled
          - -Dintrospection=disabled
        sources:
          - type: archive
            url: https://github.com/fwupd/fwupd/releases/download/2.1.2/fwupd-2.1.2.tar.xz
            sha256: 7d8d0762aa4095e8e7211a91550ab5c4db5e4fb4cad48087da522f580a4cc9d9
            x-checker-data:
              type: anitya
              project-id: 5833
              url-template: https://github.com/fwupd/fwupd/releases/download/$version/fwupd-$version.tar.xz

        modules:
          - jinja2.yaml

          - name: libjcat
            buildsystem: meson
            config-opts:
              - -Dintrospection=false
              - -Dgtkdoc=false
              - -Dtests=false
              - -Dcli=false
              - --sysconfdir=/app/etc
              - --localstatedir=/var/data
            sources:
              - type: archive
                url: https://github.com/hughsie/libjcat/releases/download/0.2.6/libjcat-0.2.6.tar.xz
                sha256: d54ad936ceb654e99f59b0227e4d1974b858970d250d98c6484abcfdc8334722
                x-checker-data:
                  type: anitya
                  project-id: 229583
                  url-template: https://github.com/hughsie/libjcat/releases/download/$version/libjcat-$version.tar.xz

      - name: flatpak
        buildsystem: meson
        config-opts:
          - -Dgtkdoc=disabled
          - -Ddocbook_docs=disabled
          - -Dtests=false
          - -Dman=disabled
          - -Dseccomp=disabled
          - -Dselinux_module=disabled
          - -Dmalcontent=disabled
          - -Dsandboxed_triggers=false
          - -Dsystem_helper=enabled # we need polkit for this, so we can install flatpaks from system remote
          - -Dsystemd=disabled
          - -Dsystem_install_dir=/var/lib/flatpak
          - -Dsystem_bubblewrap=bwrap
          - -Dsystem_dbus_proxy=xdg-dbus-proxy
          - --sysconfdir=/var/run/host/etc
        cleanup:
          - /bin/flatpak-bisect
          - /bin/flatpak-coredumpctl
          - /etc/profile.d
          - /lib/systemd
          - /share/dbus-1/interfaces/org.freedesktop.*
          - /share/dbus-1/services/org.freedesktop.*
          - /share/flatpak/triggers
          - /share/gdm
          - /share/fish
          - /share/zsh
          - /share/gir-1.0
          - /share/bash-completion
          - /lib/girepository-1.0
          - /lib/sysusers.d
          - /lib/tmpfiles.d
        post-install:
          - install -Dpm0755 -t /app/bin /usr/bin/update-{mime,desktop}-database
        sources:
          - type: git
            url: https://github.com/flatpak/flatpak/
            commit: b4c53a4cfffd5dd471589249e35be6ab9e08b6a5
            tag: 1.17.7
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
              is-important: true

        modules:
          # needed by flatpak system_helper
          - name: polkit
            buildsystem: meson
            config-opts:
              - -Dlibs-only=true
              - -Dintrospection=false
              - -Dauthfw=shadow
            rm-configure: true
            build-options:
              env:
                CFLAGS: -Wno-implicit-function-declaration
            cleanup:
              - /bin/*
              - /etc/dbus-1
              - /etc/pam.d
              - /include
              - /lib/pkgconfig
              - /lib/polkit-1
              - /share/dbus-1/system-services/*
              - /share/polkit-1
            sources:
              - type: git
                url: https://github.com/polkit-org/polkit
                commit: 9e4894c969eecf26a3ba762f4f7a268aa0fb3e51
                tag: '127'
                x-checker-data:
                  type: git
                  tag-pattern: ^([\d.]+)$

          - name: libfuse
            build-options:
              env:
                MOUNT_FUSE_PATH: ../tmp/
            config-opts:
              - UDEV_RULES_PATH=/app/etc/udev/rules.d
              - INIT_D_PATH=/app/etc/init.d
            cleanup:
              - /bin/ulockmgr_server
              - /etc/*
            post-install:
              - install -Dpm0755 ./fusermount-wrapper.sh /app/bin/fusermount
            sources:
              - type: archive
                url: https://github.com/libfuse/libfuse/releases/download/fuse-2.9.9/fuse-2.9.9.tar.gz
                sha256: d0e69d5d608cc22ff4843791ad097f554dd32540ddc9bed7638cc6fea7c1b4b5
              - type: patch
                path: patches/fuse/fuse-2.9.2-namespace-conflict-fix.patch
              - type: patch
                path: patches/fuse/fuse-disable-sys-mount-under-flatpak.patch
              - type: patch
                path: patches/fuse/fuse-2.9.2-closefrom.patch
              - type: file
                path: fusermount-wrapper.sh

          - name: ostree
            build-options:
              env:
                BASH_COMPLETIONSDIR: /app/share/bash-completion/completions
              config-opts:
                - --disable-man
                - --with-curl
                - --without-libsystemd
            cleanup:
              - /bin
              - /etc/grub.d
              - /etc/ostree
              - /share/ostree
              - /libexec
              - /share/gir-1.0
              - /share/bash-completion
              - /lib/girepository-1.0
            sources:
              - type: git
                url: https://github.com/ostreedev/ostree
                tag: v2026.1
                commit: 84fcfe17adcc69b926e8205782c1f735c09bfdd9
                x-checker-data:
                  type: anitya
                  project-id: 10899
                  tag-template: v$version

            modules:
              - pyparsing.yaml

          - name: bubblewrap
            buildsystem: meson
            config-opts:
              - -Dman=disabled
              - -Dselinux=disabled
              - -Dtests=false
            cleanup:
              - '*'
            sources:
              - type: archive
                url: https://github.com/containers/bubblewrap/archive/refs/tags/v0.11.2.tar.gz
                sha256: 3fc7b94dd133539365dc573fe79d207802ce433e6e34b791a8b1080b17803a28
                x-checker-data:
                  type: anitya
                  project-id: 10937
                  url-template: https://github.com/containers/bubblewrap/archive/refs/tags/v$version.tar.gz

          - name: xdg-dbus-proxy
            buildsystem: meson
            config-opts:
              - -Dman=disabled
              - -Dtests=false
            cleanup:
              - '*'
            sources:
              - type: archive
                url: https://github.com/flatpak/xdg-dbus-proxy/archive/refs/tags/0.1.7.tar.gz
                sha256: 232d2eb9b456fa1e307322da1bfeb4849eb410750a2a16a5de51ed2c2eb919e6
                x-checker-data:
                  type: anitya
                  project-id: 58434
                  url-template: https://github.com/flatpak/xdg-dbus-proxy/archive/refs/tags/$version.tar.gz
